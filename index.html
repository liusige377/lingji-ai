<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵芝机 - AI百宝箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(10,10,26,0.95);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:22px;font-weight:700;color:#00d4aa;text-decoration:none}
.logo span{color:#fff}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:#a0a0b0;text-decoration:none;font-size:15px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#00d4aa}
.user-area{display:flex;gap:12px;align-items:center}
.btn{padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:#e0e0e0}
.btn-outline:hover{border-color:#00d4aa;color:#00d4aa}
.btn-primary{background:linear-gradient(135deg,#00d4aa,#0099ff);color:#fff;font-weight:600}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,212,170,.4)}
.btn-ghost{background:transparent;color:#a0a0b0;font-size:13px;padding:6px 14px}
.btn-ghost:hover{color:#e0e0e0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#13132a;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;width:400px;max-width:90vw;position:relative}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#666;font-size:20px;cursor:pointer}
.modal-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:24px;text-align:center}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#888;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#00d4aa}
.form-error{color:#ff6b6b;font-size:13px;margin-top:6px;min-height:18px}
.form-success{color:#00d4aa;font-size:13px;margin-top:6px;min-height:18px}
.btn-full{width:100%;padding:12px;background:linear-gradient(135deg,#00d4aa,#0099ff);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-full:hover{opacity:.9;transform:translateY(-1px)}
.btn-full:disabled{opacity:.5;cursor:not-allowed;transform:none}
.form-switch{text-align:center;margin-top:16px;font-size:13px;color:#666}
.form-switch a{color:#00d4aa;text-decoration:none;cursor:pointer}
.hero{text-align:center;padding:80px 20px 60px}
.hero h1{font-size:52px;font-weight:800;color:#fff;margin-bottom:16px;line-height:1.2}
.hero h1 em{color:#00d4aa;font-style:normal}
.hero p{font-size:18px;color:#8888aa;max-width:560px;margin:0 auto 36px;line-height:1.7}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.section{padding:60px 40px;max-width:1100px;margin:0 auto}
.section-title{text-align:center;font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.section-desc{text-align:center;color:#666;font-size:15px;margin-bottom:40px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.tool-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px;cursor:pointer;transition:all .25s;text-decoration:none;display:block;color:inherit}
.tool-card:hover{border-color:rgba(0,212,170,.3);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.tool-icon{font-size:36px;margin-bottom:14px}
.tool-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:6px}
.tool-desc{font-size:13px;color:#666;line-height:1.5}
.tool-tag{display:inline-block;padding:2px 8px;background:rgba(0,212,170,.1);border-radius:4px;font-size:11px;color:#00d4aa;margin-top:10px}
.footer{text-align:center;padding:40px;color:#444;font-size:12px;border-top:1px solid rgba(255,255,255,.04);margin-top:40px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:#1a1a30;border:1px solid rgba(255,255,255,.1);border-radius:10px;font-size:14px;color:#e0e0e0;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:rgba(255,100,100,.3);color:#ff8080}
.toast.success{border-color:rgba(0,212,170,.3);color:#00d4aa}
@media(max-width:768px){
.header{padding:12px 16px}
.nav-links{display:none}
.hero{padding:40px 16px 30px}
.hero h1{font-size:32px}
.section{padding:40px 16px}
}
</style>
</head>
<body>
<header class="header">
<a href="#" class="logo" onclick="showHome()"><span>灵</span><span>芝</span><span>机</span></a>
<ul class="nav-links">
<li><a href="#" class="nav-item active" data-page="home" onclick="showHome()">首页</a></li>
<li><a href="#" class="nav-item" data-page="tools" onclick="showTools()">全部工具</a></li>
</ul>
<div class="user-area" id="guestArea">
<button class="btn btn-outline" onclick="showLogin()">登录</button>
<button class="btn btn-primary" onclick="showRegister()">注册</button>
</div>
<div class="user-area" id="userArea" style="display:none">
<span style="font-size:13px;color:#888" id="userNameDisplay"></span>
<button class="btn btn-ghost" onclick="logout()">退出</button>
</div>
</header>
<div class="modal-overlay" id="loginModal">
<div class="modal">
<button class="modal-close" onclick="closeModal('loginModal')">×</button>
<div class="modal-title">登录账号</div>
<div class="form-group"><label>邮箱</label><input type="email" id="loginUsername" placeholder="输入邮箱" autocomplete="email"></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password"></div>
<div class="form-error" id="loginError"></div>
<button class="btn-full" id="loginBtn" onclick="doLogin()">登录</button>
<div class="form-switch">还没有账号？<a onclick="switchModal('loginModal','registerModal')">立即注册</a></div>
</div>
</div>
<div class="modal-overlay" id="registerModal">
<div class="modal">
<button class="modal-close" onclick="closeModal('registerModal')">×</button>
<div class="modal-title">注册账号</div>
<div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="2-20位字母或数字"></div>
<div class="form-group"><label>邮箱</label><input type="email" id="regEmail" placeholder="用于找回密码"></div>
<div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="至少6位"></div>
<div class="form-error" id="regError"></div>
<button class="btn-full" id="regBtn" onclick="doRegister()">注册</button>
<div class="form-switch">已有账号？<a onclick="switchModal('registerModal','loginModal')">去登录</a></div>
</div>
</div>
<div class="hero" id="hero">
<h1>你的<span style="color:#00d4aa">AI</span>瑞士军刀</h1>
<p>聊天、写作、起名、占卜、翻译 —— 所有日常AI需求，一个地方全搞定</p>
<div class="hero-actions">
<button class="btn btn-primary" onclick="openChat()">开始聊天</button>
<button class="btn btn-outline" onclick="showTools()">查看工具</button>
</div>
</div>
<div class="section" id="toolsSection">
<div class="section-title">热门工具</div>
<div class="section-desc">精选AI功能，点击即可使用</div>
<div class="tools-grid" id="toolsGrid"></div>
</div>
<footer class="footer">
<p>© 2024 灵芝机 · <a href="https://liusige377.github.io/" style="color:#555">首页</a></p>
</footer>
<div class="toast" id="toast"></div>
<script>
(function(){
var API_BASE='http://101.133.136.55:3000';
var token=localStorage.getItem('lingji_token');
var username=localStorage.getItem('lingji_username');
var apiKey=localStorage.getItem('lingji_api_key')||'';
function chatHeaders(){var h={'Content-Type':'application/json'};if(apiKey)h['Authorization']='Bearer '+apiKey;else if(token)h['Authorization']='Bearer '+token;return h}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}
function showLogin(){document.getElementById('loginModal').classList.add('show')}
function showRegister(){document.getElementById('registerModal').classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function switchModal(from,to){closeModal(from);document.getElementById(to).classList.add('show')}
document.querySelectorAll('.modal-overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)closeModal(el.id)})});
function checkAuth(){if(token&&username){document.getElementById('guestArea').style.display='none';document.getElementById('userArea').style.display='';document.getElementById('userNameDisplay').textContent='👤 '+username}else{document.getElementById('guestArea').style.display='';document.getElementById('userArea').style.display='none'}}
function showHome(){document.getElementById('hero').style.display='';document.getElementById('toolsSection').style.display='';document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});document.querySelector('[data-page=home]').classList.add('active')}
function showTools(){document.getElementById('hero').scrollIntoView({behavior:'smooth'});document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});document.querySelector('[data-page=tools]').classList.add('active')}
async function doLogin(){var btn=document.getElementById('loginBtn');var u=document.getElementById('loginUsername').value.trim();var p=document.getElementById('loginPassword').value;var err=document.getElementById('loginError');if(!u||!p){err.textContent='请填写邮箱和密码';return}btn.disabled=true;btn.textContent='登录中...';err.textContent='';try{var res=await fetch(API_BASE+'/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:u,password:p})});var data=await res.json();if(data.token){token=data.token;username=data.name||u;localStorage.setItem('lingji_token',token);localStorage.setItem('lingji_username',username);if(data.api_key){apiKey=data.api_key;localStorage.setItem('lingji_api_key',apiKey)}closeModal('loginModal');checkAuth();showToast('登录成功！','success')}else{err.textContent=data.error&&data.error.message||'登录失败'}}catch(e){err.textContent='网络错误，请稍后重试'}btn.disabled=false;btn.textContent='登录'}
async function doRegister(){var btn=document.getElementById('regBtn');var u=document.getElementById('regUsername').value.trim();var em=document.getElementById('regEmail').value.trim();var p=document.getElementById('regPassword').value;var code=document.getElementById('regCode').value.trim();var err=document.getElementById('regError');if(!u||!em||!p||!code){err.textContent='请填写所有信息';return}btn.disabled=true;btn.textContent='注册中...';err.textContent='';try{var res=await fetch(API_BASE+'/v1/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:em,password:p,code:code})});var data=await res.json();if(res.ok){showToast('注册成功，请登录','success');switchModal('registerModal','loginModal')}else{err.textContent=data.error&&data.error.message||'注册失败'}}catch(e){err.textContent='网络错误'}btn.disabled=false;btn.textContent='注册'}
function logout(){token=null;username=null;localStorage.removeItem('lingji_token');localStorage.removeItem('lingji_username');localStorage.removeItem('lingji_email');checkAuth();showToast('已退出登录','success')}
function openChat(){showToast('聊天功能开发中，即将上线！','success')}
function getToolOnclick(id,prompt){return"showToast('"+id+" 功能开发中','success')"}
function showToolsPage(){}
function renderTools(tools){var grid=document.getElementById('toolsGrid');if(!tools||!tools.length){grid.innerHTML='<p style="color:#666;text-align:center;grid-column:1/-1">暂无可用工具，请检查网络连接</p>';return}grid.innerHTML=tools.map(function(t){var name=t.name||t.title||'未命名';var desc=t.desc||t.description||'';var icon=t.icon||'📝';var tag=t.tag||'';var tagType=t.tagType||'';return'<a class="tool-card" href="#" onclick="'+getToolOnclick(t.id,t.prompt)+';return false;">'+(icon?'<div class="tool-icon">'+icon+'</div>':'')+'<div class="tool-name">'+name+'</div>'+(desc?'<div class="tool-desc">'+desc+'</div>':'')+(tag?'<div class="tool-tag '+tagType+'">'+tag+'</div>':'')+'</a>'}).join('')}
async function loadSiteTools(){try{var r=await fetch(API_BASE+'/v1/site-config',{signal:AbortSignal.timeout(5000)});if(!r.ok){renderDefaultTools();return}var data=await r.json();var tools=data.tools||[];var quickTools=data.quickTools||[];if(tools.length>0){renderTools(tools)}else{renderDefaultTools()}}catch(e){renderDefaultTools()}}
function renderDefaultTools(){var defaults=[{id:'chat',name:'智能聊天',desc:'随时聊天，AI助手帮你解答一切问题',icon:'💬',tag:'热门'},{id:'roleplay',name:'角色扮演',desc:'模拟各种场景对话，学习面试两不误',icon:'🎭',tag:'趣味'},{id:'writing',name:'写作工坊',desc:'文案、报告、邮件，各种文本一键生成',icon:'✍️'},{id:'namer',name:'起名大师',desc:'宝宝起名、公司命名、品牌创意一网打尽',icon:'🏷️'},{id:'translator',name:'翻译助手',desc:'中英日韩法德西，多语言即时互译',icon:'🌐'},{id:'tarot',name:'塔罗占卜',desc:'神秘塔罗牌解读，指引人生方向',icon:'🔮'}];renderTools(defaults)}
checkAuth();loadSiteTools();
})();
</script>
</body>
</html>
